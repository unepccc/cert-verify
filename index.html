UNEP‑CCC Certificate Verification

Author: Aristeidis Tsakiris

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Certificate Verification – UNEP Copenhagen Climate Centre</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@300;400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --un-blue:      #009edb;
      --un-dark:      #1a3a5c;
      --un-mid:       #2e6da4;
      --valid-green:  #1a7a4a;
      --valid-bg:     #edf7f1;
      --valid-border: #4caf82;
      --revoked-amber:#9a6200;
      --revoked-bg:   #fdf6e3;
      --revoked-border:#d4a017;
      --notfound-red: #c0392b;
      --notfound-bg:  #fdf0ee;
      --notfound-border:#e07568;
      --surface:      #ffffff;
      --bg:           #f0f4f8;
      --text:         #1c2b3a;
      --text-muted:   #5a6e82;
      --border:       #d8e2ec;
      --radius:       10px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ── Top bar ── */
    .topbar {
      background: #ffffff;
      border-bottom: 3px solid var(--un-dark);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topbar-logo {
      height: 44px;
      width: auto;
      display: block;
    }

    .topbar-tagline {
      font-family: 'Source Serif 4', serif;
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    /* ── Language bar ── */
    .lang-bar {
      background: #e8eef5;
      border-bottom: 1px solid var(--border);
      padding: 7px 24px;
      display: flex;
      justify-content: flex-end;
      gap: 4px;
    }

    .lang-bar span {
      font-size: 12px;
      color: var(--text-muted);
      margin-right: 6px;
      line-height: 26px;
    }

    .lang-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 10px;
      font-size: 12px;
      font-family: inherit;
      color: var(--un-mid);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .lang-btn:hover,
    .lang-btn.active {
      background: var(--un-dark);
      color: #fff;
      border-color: var(--un-dark);
    }

    /* ── Main card ── */
    .container {
      max-width: 760px;
      margin: 36px auto;
      padding: 0 16px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: 0 2px 16px rgba(0,0,0,0.09);
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, var(--un-dark) 0%, #1a5c3a 100%);
      padding: 32px 36px 28px;
      color: #fff;
    }

    .card-header h1 {
      font-family: 'Source Serif 4', serif;
      font-weight: 600;
      font-size: 26px;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    .card-header p {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.85;
      max-width: 520px;
      line-height: 1.6;
    }

    .card-body {
      padding: 32px 36px;
    }

    /* ── Search box ── */
    .search-section label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 8px;
    }

    .search-row {
      display: flex;
      gap: 10px;
    }

    .search-row input {
      flex: 1;
      padding: 11px 14px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .search-row input:focus {
      border-color: var(--un-blue);
    }

    .search-row input::placeholder {
      color: #aab8c6;
    }

    .btn-verify {
      padding: 11px 22px;
      background: var(--un-dark);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .btn-verify:hover { background: var(--un-mid); }

    .btn-print {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 20px;
      background: var(--valid-green);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-print:hover { background: #145c37; }

    /* ── Result panels ── */
    #verification-result {
      margin-top: 28px;
    }

    .result-panel {
      border-radius: var(--radius);
      padding: 24px 28px;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-panel.valid {
      background: var(--valid-bg);
      border: 1.5px solid var(--valid-border);
    }

    .result-panel.revoked {
      background: var(--revoked-bg);
      border: 1.5px solid var(--revoked-border);
    }

    .result-panel.not-found {
      background: var(--notfound-bg);
      border: 1.5px solid var(--notfound-border);
    }

    .result-heading {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Source Serif 4', serif;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 18px;
    }

    .result-heading .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 14px;
      flex-shrink: 0;
    }

    .valid .badge   { background: var(--valid-green); color: #fff; }
    .revoked .badge { background: var(--revoked-amber); color: #fff; }
    .not-found .badge { background: var(--notfound-red); color: #fff; }

    .valid .result-heading   { color: var(--valid-green); }
    .revoked .result-heading { color: var(--revoked-amber); }
    .not-found .result-heading { color: var(--notfound-red); }

    .cert-fields {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 10px 16px;
      font-size: 14px;
    }

    .cert-fields dt {
      color: var(--text-muted);
      font-weight: 500;
      line-height: 1.5;
    }

    .cert-fields dd {
      color: var(--text);
      font-weight: 400;
      line-height: 1.5;
      word-break: break-word;
    }

    .cert-fields dd.cert-id {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.03em;
    }

    .revoke-note {
      margin-top: 16px;
      padding: 12px 16px;
      background: rgba(154,98,0,0.08);
      border-radius: 6px;
      font-size: 13px;
      color: var(--revoked-amber);
      line-height: 1.5;
    }

    .notfound-hint {
      margin-top: 8px;
      font-size: 13px;
      color: var(--notfound-red);
      opacity: 0.8;
      line-height: 1.5;
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }

    /* ── Footer ── */
    .card-footer {
      padding: 18px 36px;
      background: #f7f9fb;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--un-mid);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-msg {
      color: var(--text-muted);
      font-size: 14px;
      padding: 16px 0;
    }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .card-header, .card-body { padding: 24px 20px; }
      .card-footer { padding: 16px 20px; }
      .search-row { flex-direction: column; }
      .cert-fields { grid-template-columns: 1fr; gap: 4px; }
      .cert-fields dt { margin-top: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
      .topbar-logo { height: 32px; }
      .topbar-tagline { display: none; }
    }
  </style>
</head>

<body>

<!-- Top bar -->
<div class="topbar">
  <img
    class="topbar-logo"
    src="assets/unepccc-logo.png"
    alt="UNEP Copenhagen Climate Centre"
  />
  <span class="topbar-tagline">Certificate Verification Service</span>
</div>

<!-- Language bar -->
<div class="lang-bar">
  <span id="langLabel">Language:</span>
  <button class="lang-btn active" onclick="setLanguage('en')" id="btn-en">EN</button>
  <button class="lang-btn" onclick="setLanguage('fr')" id="btn-fr">FR</button>
  <button class="lang-btn" onclick="setLanguage('es')" id="btn-es">ES</button>
  <button class="lang-btn" onclick="setLanguage('zh')" id="btn-zh">中文</button>
</div>

<div class="container">
  <div class="card">

    <div class="card-header">
      <h1 id="title"></h1>
      <p id="intro"></p>
    </div>

    <div class="card-body">
      <div class="search-section">
        <label for="certInput" id="inputLabel"></label>
        <div class="search-row">
          <input id="certInput" type="text" autocomplete="off" spellcheck="false" />
          <button class="btn-verify" onclick="manualVerify()" id="verifyBtn"></button>
        </div>
      </div>

      <section id="verification-result" aria-live="polite"></section>
    </div>

    <div class="card-footer" id="footerText"></div>

  </div>
</div>

<script>
const translations = {
  en: {
    title:        "Certificate Verification",
    intro:        "Verify a certificate by scanning the QR code on the document, or by entering the Certificate ID below.",
    inputLabel:   "Certificate ID",
    placeholder:  "e.g. UNEPCCC-WEB-2026-123456",
    verifyBtn:    "Verify",
    loading:      "Verifying…",
    valid:        "Certificate Valid",
    revoked:      "Certificate Revoked",
    revokedNote:  "This certificate has been revoked by the issuing organisation and is no longer valid.",
    notFound:     "Certificate Not Found",
    notFoundHint: "Please check the Certificate ID and try again. If you believe this is an error, contact the issuing organisation.",
    name:         "Name",
    webinar:      "Webinar",
    webinarDate:  "Webinar date",
    dateIssued:   "Date of issue",
    certificateId:"Certificate ID",
    footer:       "This is an official certificate verification service of the UNEP Copenhagen Climate Centre. Certificates are issued for participation in UNEP-CCC capacity development webinars.",
    printBtn:     "Print / Save Certificate"
  },
  fr: {
    title:        "Vérification du certificat",
    intro:        "Vérifiez un certificat en scannant le code QR ou en saisissant l'identifiant ci-dessous.",
    inputLabel:   "Identifiant du certificat",
    placeholder:  "ex. UNEPCCC-WEB-2026-123456",
    verifyBtn:    "Vérifier",
    loading:      "Vérification…",
    valid:        "Certificat valide",
    revoked:      "Certificat révoqué",
    revokedNote:  "Ce certificat a été révoqué par l'organisme émetteur et n'est plus valide.",
    notFound:     "Certificat introuvable",
    notFoundHint: "Veuillez vérifier l'identifiant et réessayer. Si vous pensez qu'il s'agit d'une erreur, contactez l'organisation émettrice.",
    name:         "Nom",
    webinar:      "Webinaire",
    webinarDate:  "Date du webinaire",
    dateIssued:   "Date de délivrance",
    certificateId:"Identifiant du certificat",
    footer:       "Il s'agit du service officiel de vérification des certificats du PNUE Centre Climatique de Copenhague.",
    printBtn:     "Imprimer / Enregistrer le certificat"
  },
  es: {
    title:        "Verificación de certificado",
    intro:        "Verifique un certificado escaneando el código QR o introduciendo el ID del certificado.",
    inputLabel:   "ID del certificado",
    placeholder:  "ej. UNEPCCC-WEB-2026-123456",
    verifyBtn:    "Verificar",
    loading:      "Verificando…",
    valid:        "Certificado válido",
    revoked:      "Certificado revocado",
    revokedNote:  "Este certificado ha sido revocado por la organización emisora y ya no es válido.",
    notFound:     "Certificado no encontrado",
    notFoundHint: "Compruebe el ID del certificado e inténtelo de nuevo.",
    name:         "Nombre",
    webinar:      "Seminario web",
    webinarDate:  "Fecha del seminario",
    dateIssued:   "Fecha de emisión",
    certificateId:"ID del certificado",
    footer:       "Este es el servicio oficial de verificación de certificados del Centro Climático de Copenhague del PNUMA.",
    printBtn:     "Imprimir / Guardar certificado"
  },
  zh: {
    title:        "证书验证",
    intro:        "您可以扫描证书上的二维码，或在下方输入证书编号进行验证。",
    inputLabel:   "证书编号",
    placeholder:  "例：UNEPCCC-WEB-2026-123456",
    verifyBtn:    "验证",
    loading:      "验证中…",
    valid:        "证书有效",
    revoked:      "证书已撤销",
    revokedNote:  "该证书已被颁发机构撤销，不再有效。",
    notFound:     "未找到证书",
    notFoundHint: "请检查证书编号后重试。",
    name:         "姓名",
    webinar:      "网络研讨会",
    webinarDate:  "研讨会日期",
    dateIssued:   "签发日期",
    certificateId:"证书编号",
    footer:       "这是联合国环境规划署哥本哈根气候中心的官方证书验证服务。",
    printBtn:     "打印 / 保存证书"
  }
};

let lang = "en";

function formatName(first, last) {
  // Suppress placeholder last names ("." or empty)
  const lastClean = (last && last.trim() !== "." && last.trim() !== "") ? last.trim() : "";
  return lastClean ? `${first.trim()} ${lastClean}` : first.trim();
}

function sanitiseCertId(raw) {
  // Allow only characters valid in the cert ID format; reject anything suspicious
  return raw.replace(/[^A-Za-z0-9\-]/g, "").toUpperCase();
}

function applyTranslations() {
  const t = translations[lang];
  document.getElementById("title").innerText       = t.title;
  document.getElementById("intro").innerText       = t.intro;
  document.getElementById("inputLabel").innerText  = t.inputLabel;
  document.getElementById("certInput").placeholder = t.placeholder;
  document.getElementById("verifyBtn").innerText   = t.verifyBtn;
  document.getElementById("footerText").innerText  = t.footer;

  // Update active language button
  ["en","fr","es","zh"].forEach(l => {
    document.getElementById("btn-" + l).classList.toggle("active", l === lang);
  });
}

function setLanguage(l) {
  lang = l;
  applyTranslations();
  const currentCert = document.getElementById("certInput").value.trim();
  if (currentCert) verifyCertificate(sanitiseCertId(currentCert));
}

function manualVerify() {
  const raw = document.getElementById("certInput").value.trim();
  if (!raw) return;
  const certId = sanitiseCertId(raw);
  document.getElementById("certInput").value = certId;
  verifyCertificate(certId);
}

// Allow Enter key to trigger verification
document.getElementById("certInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") manualVerify();
});

async function verifyCertificate(certId) {
  const t      = translations[lang];
  const result = document.getElementById("verification-result");

  // Show loading state
  result.innerHTML = `<p class="loading-msg"><span class="spinner"></span>${t.loading}</p>`;

  try {
    const resp = await fetch(`certificates/${encodeURIComponent(certId)}.json`);

    if (!resp.ok) throw new Error("not_found");

    const r = await resp.json();

    if (r.status === "Revoked") {
      result.innerHTML = `
        <div class="result-panel revoked">
          <div class="result-heading">
            <span class="badge">⚠</span>${t.revoked}
          </div>
          <dl class="cert-fields">
            <dt>${t.name}</dt>         <dd>${formatName(r.firstName, r.lastName)}</dd>
            <dt>${t.webinar}</dt>      <dd>${r.webinarTitle}</dd>
            <dt>${t.webinarDate}</dt>  <dd>${r.webinarDate}</dd>
            <dt>${t.dateIssued}</dt>   <dd>${r.dateIssued}</dd>
            <dt>${t.certificateId}</dt><dd class="cert-id">${r.certificateId}</dd>
          </dl>
          <div class="revoke-note">${t.revokedNote}</div>
        </div>`;
    } else {
      result.innerHTML = `
        <div class="result-panel valid">
          <div class="result-heading">
            <span class="badge">✓</span>${t.valid}
          </div>
          <dl class="cert-fields">
            <dt>${t.name}</dt>         <dd>${formatName(r.firstName, r.lastName)}</dd>
            <dt>${t.webinar}</dt>      <dd>${r.webinarTitle}</dd>
            <dt>${t.webinarDate}</dt>  <dd>${r.webinarDate}</dd>
            <dt>${t.dateIssued}</dt>   <dd>${r.dateIssued}</dd>
            <dt>${t.certificateId}</dt><dd class="cert-id">${r.certificateId}</dd>
          </dl>
          <div style="margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--valid-border);">
            <button class="btn-print" onclick='printCertificate(${JSON.stringify(r)})'>
              ⬇ ${t.printBtn}
            </button>
          </div>
        </div>`;
    }

  } catch {
    result.innerHTML = `
      <div class="result-panel not-found">
        <div class="result-heading">
          <span class="badge">✕</span>${t.notFound}
        </div>
        <p class="notfound-hint">${t.notFoundHint}</p>
      </div>`;
  }
}

// Auto-verify if ?cert= is in the URL
applyTranslations();
const urlParams    = new URLSearchParams(window.location.search);
const certFromURL  = urlParams.get("cert");
if (certFromURL) {
  const cleaned = sanitiseCertId(certFromURL);
  document.getElementById("certInput").value = cleaned;
  verifyCertificate(cleaned);
}

// ── Print Certificate ─────────────────────────────────────────────────────

function printCertificate(r) {
  const verifyUrl = `https://unepccc.github.io/cert-verify/?cert=${encodeURIComponent(r.certificateId)}`;
  const qrApiUrl  = `https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(verifyUrl)}`;

  const firstName = r.firstName ? r.firstName.trim() : "";
  const lastName  = (r.lastName && r.lastName.trim() !== "." && r.lastName.trim() !== "")
                    ? r.lastName.trim() : "";

  const win = window.open("", "_blank");
  win.document.write(`<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Certificate – ${r.certificateId}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    @page {
      size: A4 portrait;
      margin: 0;
    }

    body {
      font-family: 'DM Sans', Arial, sans-serif;
      background: #fff;
      color: #1c2b3a;
      width: 210mm;
      min-height: 297mm;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .cert-header {
      padding: 28px 40px 0;
    }

    .cert-logo {
      height: 52px;
      width: auto;
    }

    /* ── Main body ── */
    .cert-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px 60px 0;
    }

    .cert-title {
      font-family: 'Source Serif 4', 'Georgia', serif;
      font-size: 38px;
      font-weight: 700;
      color: #1a2e3b;
      margin-bottom: 28px;
      letter-spacing: -0.01em;
    }

    .cert-presented {
      font-size: 15px;
      color: #5a6e82;
      margin-bottom: 14px;
    }

    .cert-name {
      font-family: 'Source Serif 4', 'Georgia', serif;
      font-size: 34px;
      font-weight: 600;
      color: #1a3a5c;
      line-height: 1.25;
      margin-bottom: 28px;
    }

    .cert-for {
      font-size: 15px;
      color: #5a6e82;
      margin-bottom: 14px;
    }

    .cert-webinar {
      font-family: 'Source Serif 4', 'Georgia', serif;
      font-size: 20px;
      font-weight: 600;
      color: #1a2e3b;
      max-width: 500px;
      line-height: 1.4;
      margin-bottom: 18px;
    }

    .cert-date {
      font-size: 15px;
      color: #1c2b3a;
      margin-bottom: 36px;
    }

    .cert-rule {
      width: 80px;
      border: none;
      border-top: 2px solid #009edb;
      margin: 0 auto 28px;
    }

    .cert-attendance-note {
      font-size: 12.5px;
      color: #5a6e82;
      max-width: 440px;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .cert-attendance-note strong {
      color: #1c2b3a;
    }

    /* ── Meta row ── */
    .cert-meta {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      margin-bottom: 36px;
    }

    .cert-meta-line {
      font-size: 12px;
      color: #5a6e82;
    }

    .cert-meta-line span {
      color: #1c2b3a;
    }

    .cert-qr {
      width: 100px;
      height: 100px;
      margin-top: 8px;
    }

    .cert-scan-label {
      font-size: 11px;
      color: #5a6e82;
      margin-top: 5px;
    }

    /* ── Footer bar ── */
    .cert-footer {
      display: flex;
      height: 10px;
      width: 100%;
      margin-top: auto;
    }

    .cert-footer-blue  { flex: 1; background: #009edb; }
    .cert-footer-green { width: 80px; background: #4caf50; }

    .cert-footer-address {
      text-align: center;
      font-size: 10px;
      color: #888;
      padding: 6px 0 4px;
    }
  </style>
</head>
<body>

  <div class="cert-header">
    <img class="cert-logo"
         src="https://unepccc.github.io/cert-verify/assets/unepccc-logo.png"
         alt="UNEP Copenhagen Climate Centre"
         onerror="this.style.display='none'" />
  </div>

  <div class="cert-body">

    <h1 class="cert-title">Certificate of Attendance</h1>

    <p class="cert-presented">The certificate is presented to</p>

    <div class="cert-name">
      ${firstName}<br>${lastName ? `${lastName}` : ""}
    </div>

    <p class="cert-for">For attending the webinar</p>

    <div class="cert-webinar">${r.webinarTitle}</div>

    <p class="cert-date">${r.webinarDate}</p>

    <hr class="cert-rule"/>

    <p class="cert-attendance-note">
      The <strong>Certificate of Attendance</strong> is distributed to attendees
      who were online for at least 75% of the webinar duration.
    </p>

    <div class="cert-meta">
      <p class="cert-meta-line">Certificate ID: <span>${r.certificateId}</span></p>
      <p class="cert-meta-line">Verification link: <span>https://unepccc.github.io/cert-verify/?cert=${r.certificateId}</span></p>
      <p class="cert-scan-label">Scan the QR code for certificate verification</p>
      <img class="cert-qr" src="${qrApiUrl}" alt="QR code for certificate verification" />
    </div>

  </div>

  <p class="cert-footer-address">
    UNEP Copenhagen Climate Centre &nbsp;│&nbsp; Marmorvej 51 &nbsp;│&nbsp; 2100 Copenhagen Ø &nbsp;│&nbsp; Denmark
  </p>
  <div class="cert-footer">
    <div class="cert-footer-blue"></div>
    <div class="cert-footer-green"></div>
  </div>

  <script>
    // Wait for logo and QR image, then print
    window.onload = function() {
      const images = document.querySelectorAll('img');
      let loaded = 0;
      const total = images.length;
      function tryPrint() {
        loaded++;
        if (loaded >= total) {
          setTimeout(function() { window.print(); }, 200);
        }
      }
      if (total === 0) {
        setTimeout(function() { window.print(); }, 300);
      } else {
        images.forEach(function(img) {
          if (img.complete) {
            tryPrint();
          } else {
            img.addEventListener('load', tryPrint);
            img.addEventListener('error', tryPrint);
          }
        });
      }
    };
  <\/script>

</body>
