name: Generate Certificate JSON Files

on:
  push:
    paths:
      - 'certificates.csv'   # Only runs when this file is updated
  workflow_dispatch:         # Also allows manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Needed to commit JSON files back to the repo

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run certificate generator
        run: python scripts/generate_certs.py

      - name: Commit generated JSON files
        run: |
          git config user.name  "cert-bot"
          git config user.email "cert-bot@users.noreply.github.com"
          git add certificates/
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: regenerate certificate JSON files [skip ci]"
          git push
