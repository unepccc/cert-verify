name: Generate Certificate JSON Files

on:
  push:
    branches:
      - main                   # Fast path: regenerate immediately on commits to main
    paths:
      - 'certificates.csv'     # ...that change the source CSV
  schedule:
    # Safety net so certificates are ALWAYS generated automatically. GitHub skips
    # the push trigger above whenever a commit message contains [skip ci]; this
    # hourly run regenerates regardless of the commit message (and also catches any
    # missed push). It only commits when a certificate file actually changed, so
    # idle runs are no-ops. Runs at :23 to dodge the top-of-hour Actions backlog.
    - cron: '23 * * * *'
  workflow_dispatch:           # Also allows manual trigger from the Actions UI

# Prevent a scheduled run and a push-triggered run from racing on `git push`.
concurrency:
  group: generate-certs
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # Needed to commit JSON files back to the repo

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run certificate generator
        run: python scripts/generate_certs.py

      - name: Commit generated JSON files
        run: |
          git config user.name  "cert-bot"
          git config user.email "cert-bot@users.noreply.github.com"
          git add certificates/ stats.json
          # Commit only when a certificate JSON actually changed. stats.json's
          # generatedAt timestamp changes on every run, so keying the commit on it
          # would make the hourly safety-net run commit every hour for nothing.
          if git diff --cached --quiet -- certificates/; then
            echo "No certificate changes — nothing to commit."
          else
            git commit -m "chore: regenerate certificate JSON files [skip ci]"
            git push origin main
          fi
